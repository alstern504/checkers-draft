kind = "web"
previewPath = "/"
title = "Checkers Draft"
version = "1.0.0"
id = "artifacts/checkers-draft"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23294

[services.development]
run = "pnpm --filter @workspace/checkers-draft run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/checkers-draft", "run", "build" ]
publicDir = "artifacts/checkers-draft/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23294"
BASE_PATH = "/"
